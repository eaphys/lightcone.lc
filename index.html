<!DOCTYPE html>
<html>
<head>
    <title>Simulación Cono de Luz</title>
    <style> body { margin: 0; } canvas { width: 100%; height: 100% } </style>
</head>
<body>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // 1. ESCENA (El universo)
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. GEOMETRÍA (El Cono de Luz)
        // Usamos un cono doble para representar pasado y futuro
        const geometry = new THREE.ConeGeometry(5, 10, 32, 1, true); 
        const material = new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true, transparent: true, opacity: 0.5 });
        
        const conoFuturo = new THREE.Mesh(geometry, material);
        scene.add(conoFuturo);

        camera.position.z = 15;

        // 3. ANIMACIÓN (El bucle)
        function animate() {
            requestAnimationFrame(animate);
            conoFuturo.rotation.y += 0.01; // Rotación para ver el 3D
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
